# VLM-ARB Configuration (Cloud-first with Google Drive + Firestore)

# ===== FIREBASE FIRESTORE CONFIGURATION =====
# For real-time team collaboration and metrics logging

firebase:
  # Project settings
  project_id: "vlm-arb"  # Your Firebase project ID (from Firebase Console)
  credentials_path: "/root/VLM-ARB-Team/secrets/serviceAccountKey.json"
  
  # Firestore collections for results and metadata
  firestore:
    collections:
      results: "results"              # Evaluation metrics (ASR, ODS, SBR)
      configs: "team_configs"         # Shared dataset info
      reports: "reports"              # Report metadata

# ===== GOOGLE DRIVE CONFIGURATION =====
# All files (datasets, reports) stored on Google Drive for team sharing

drive:
  # Shared team folder
  team_folder: "/content/drive/MyDrive/VLM-ARB-Team"
  
  # Subdirectories
  datasets_dir: "datasets"
  reports_dir: "reports"
  secrets_dir: "secrets"

# ===== LOCAL CACHE (Offline Mode) =====
# When offline, results are cached locally and synced when online

cache:
  enabled: true
  cache_dir: "/tmp/vlm_arb_cache"

# ===== LOGGING =====
logging:
  level: "INFO"  # "DEBUG", "INFO", "WARNING", "ERROR"

# ===== REPRODUCIBILITY =====
seed: 42
